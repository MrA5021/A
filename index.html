<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Fun Facts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }
        .container {
            background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 40px; max-width: 600px; width: 100%; text-align: center;
        }
        h1 { color: #333; margin-bottom: 30px; font-size: 2.5em; }
        .fact-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px;
            min-height: 150px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2em; line-height: 1.6; font-weight: 500; transition: all 0.3s ease;
        }
        .fact-box:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
        button {
            background: #667eea; color: white; border: none; padding: 12px 40px;
            font-size: 1em; border-radius: 25px; cursor: pointer; transition: all 0.3s ease;
            font-weight: 600;
        }
        button:hover { background: #764ba2; transform: scale(1.05); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        button:active { transform: scale(0.98); }
        .fact-counter { color: #999; font-size: 0.9em; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Fun Facts</h1>
        <div class="fact-box" id="factBox">
            Click the button below to discover a fun fact!
        </div>
        <button onclick="displayRandomFact()">Get a Random Fact</button>
        <div class="fact-counter" id="counter"></div>
    </div>

    <script>
        const facts = [
            "🌍 Honey never spoils. Archaeologists have found 3,000-year-old honey in Egyptian tombs that was still edible!",
            "🦑 Octopuses have three hearts and blue blood due to a copper-based protein called hemocyanin.",
            "🌳 Trees can 'talk' to each other through an underground network called the 'Wood Wide Web' using fungal connections.",
            "⚡ A lightning bolt is about 5 times hotter than the surface of the sun (around 30,000 Kelvin).",
            "🐢 Sea turtles cry to remove excess salt from their bodies, not because they're sad.",
            "🧠 Your brain uses 20% of your body's energy while being only 2% of your body weight.",
            "🦘 Kangaroos can't walk backwards, which is why they're on the Australian coat of arms representing progress.",
            "🐪 A camel can drink up to 40 gallons of water in one sitting.",
            "✨ Bananas are berries, but strawberries aren't! Strawberries are actually 'aggregate accessory fruits.'",
            "🐑 Sheep have amazing memories and can remember faces of up to 50 different animals for years.",
            "🎸 A guitar string vibrates about 440 times per second when playing the note A.",
            "👣 Your nose can remember up to 1 trillion different scents.",
            "🌙 The moon is slowly moving away from Earth at about 1.5 inches per year.",
            "🦆 Ducks sleep with one eye open to watch for predators.",
            "🍌 Peanuts aren't actually nuts; they're legumes, more closely related to beans and lentils.",
            "❄️ Snowflakes are always six-sided due to the way water molecules crystallize.",
            "🐝 Honey bees do a special dance called the 'waggle dance' to communicate the location of food sources.",
            "🏔️ Mount Everest grows about 4 millimeters every year due to geological plate movement.",
            "🐙 The mimic octopus can impersonate over 15 different species of fish and crustaceans.",
            "⏰ A day on Venus is longer than a year on Venus!"
        ];

        let factsDisplayed = 0;

        function displayRandomFact() {
            const factBox = document.getElementById('factBox');
            const randomIndex = Math.floor(Math.random() * facts.length);
            factBox.textContent = facts[randomIndex];
            factsDisplayed++;
            document.getElementById('counter').textContent = `Facts viewed: ${factsDisplayed}`;
        }
    </script>
</body>
</html>
